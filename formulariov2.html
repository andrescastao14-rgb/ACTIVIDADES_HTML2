<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Formulario de Inscripción</title>
<link rel="stylesheet" href="style1.css">
</head>

<body>

<div class="formulario">

<h2>Formulario de Inscripción</h2>

<form id="formulario">

<label>Tipo de documento</label>
<select id="tipoDoc" required>
<option value="">Seleccione</option>
<option>Cédula</option>
<option>Tarjeta de Identidad</option>
<option>Pasaporte</option>
</select>

<label>Número de documento</label>
<input type="text" id="documento" pattern="[0-9]+" required>

<label>Nombres</label>
<input type="text" id="nombres" minlength="3" maxlength="64" required>

<label>Apellidos</label>
<input type="text" id="apellidos" minlength="3" maxlength="64" required>

<label>Dirección</label>
<input type="text" id="direccion" required>

<label>Teléfono fijo</label>
<input type="tel" id="telFijo" pattern="[0-9]+" required>

<label>Teléfono celular</label>
<input type="tel" id="celular" pattern="[0-9]+" required>

<label>Correo electrónico</label>
<input type="email" id="correo" required>

<label>Usuario</label>
<input type="text" id="usuario" pattern="[A-Za-z]{3,14}[0-9]{0,2}" required>

<label>Password</label>
<input type="password" id="password"
pattern="(?=.*[A-Z])(?=(.*[a-z]){2,})(?=(.*[0-9]){5,})[A-Za-z0-9!?+\-/&$]{16}"
required>

<label>Fecha de inscripción</label>
<input type="date" id="fecha" min="2026-02-15" max="2026-03-06" required>

<label>Hobbies</label>

<div class="hobbies">
<label><input type="checkbox" name="hobby" value="Deporte"> Deporte</label><br>
<label><input type="checkbox" name="hobby" value="Música"> Música</label><br>
<label><input type="checkbox" name="hobby" value="Lectura"> Lectura</label><br>
<label><input type="checkbox" name="hobby" value="Videojuegos"> Videojuegos</label>
</div>

<div class="botones">
<button type="submit">Enviar</button>
<button type="reset">Limpiar</button>
</div>

</form>

</div>

<!-- 👇 Aquí enlazas el JS -->
<script src="script.js"></script>

</body>
</html>
